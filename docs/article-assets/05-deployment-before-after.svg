<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Deployment Before and After</title>
  <desc id="desc">A monolith deploys as one build to one GitHub Pages site, while micro-frontends deploy the shell and each remote separately.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#101820" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="#F8FAFC"/>
  <text x="92" y="118" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="0">Act 7: Independent Deployment</text>
  <text x="92" y="162" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0">The payoff is autonomy. The price is operational complexity.</text>
  <g filter="url(#shadow)">
    <rect x="92" y="234" width="552" height="444" rx="30" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="368" y="294" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="0">Before: Nx monolith</text>
    <rect x="224" y="374" width="288" height="84" rx="20" fill="#101820"/>
    <text x="368" y="424" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="0">One build</text>
    <path d="M368 458 V520" stroke="#35D0BA" stroke-width="8" stroke-linecap="round"/>
    <path d="M338 496 L368 530 L398 496" stroke="#35D0BA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="190" y="530" width="356" height="84" rx="20" fill="#35D0BA"/>
    <text x="368" y="580" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="0">One GitHub Pages site</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="756" y="234" width="552" height="444" rx="30" fill="#101820"/>
    <text x="1032" y="294" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="0">After: Micro-frontends</text>
    <rect x="818" y="352" width="164" height="70" rx="18" fill="#FFFFFF"/>
    <text x="900" y="395" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle" letter-spacing="0">Shell</text>
    <rect x="1030" y="352" width="164" height="70" rx="18" fill="#35D0BA"/>
    <text x="1112" y="395" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle" letter-spacing="0">CRM</text>
    <rect x="818" y="498" width="164" height="70" rx="18" fill="#F7C948"/>
    <text x="900" y="541" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle" letter-spacing="0">Inventory</text>
    <rect x="1030" y="498" width="164" height="70" rx="18" fill="#FF6B5F"/>
    <text x="1112" y="541" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" text-anchor="middle" letter-spacing="0">Accounting</text>
    <text x="1032" y="628" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" letter-spacing="0">Four deployable sites, four release clocks</text>
  </g>
</svg>
