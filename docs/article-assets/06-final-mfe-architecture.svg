<svg width="1400" height="788" viewBox="0 0 1400 788" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Final Micro-Frontend Architecture</title>
  <desc id="desc">A shell host composes CRM, inventory, and accounting remotes at runtime, with shared UI and contracts underneath.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#101820" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1400" height="788" fill="#101820"/>
  <text x="92" y="118" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="0">Act 8: Final Architecture</text>
  <text x="92" y="162" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0">The shell composes. The remotes own domain screens.</text>
  <g filter="url(#shadow)">
    <rect x="552" y="226" width="296" height="104" rx="24" fill="#FFFFFF"/>
    <text x="700" y="275" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" text-anchor="middle" letter-spacing="0">Shell host</text>
    <text x="700" y="306" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="0">layout, dashboard, nav</text>
  </g>
  <path d="M700 330 V394" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
  <path d="M326 394 H1074" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
  <path d="M326 394 V446 M700 394 V446 M1074 394 V446" stroke="#CBD5E1" stroke-width="7" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <rect x="190" y="446" width="272" height="112" rx="23" fill="#35D0BA"/>
    <text x="326" y="499" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="0">CRM remote</text>
    <text x="326" y="529" fill="#10443C" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="0">/crm route tree</text>
    <rect x="564" y="446" width="272" height="112" rx="23" fill="#F7C948"/>
    <text x="700" y="499" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="0">Inventory remote</text>
    <text x="700" y="529" fill="#604500" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="0">/inventory route tree</text>
    <rect x="938" y="446" width="272" height="112" rx="23" fill="#FF6B5F"/>
    <text x="1074" y="499" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="0">Accounting remote</text>
    <text x="1074" y="529" fill="#5E1F1A" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle" letter-spacing="0">/accounting route tree</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="384" y="638" width="632" height="78" rx="20" fill="#FFFFFF"/>
    <text x="700" y="686" fill="#101820" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" text-anchor="middle" letter-spacing="0">Shared UI and version-aware contracts</text>
  </g>
  <path d="M326 558 C354 622 468 630 518 638 M700 558 V638 M1074 558 C1046 622 932 630 882 638" stroke="#64748B" stroke-width="6" stroke-linecap="round"/>
